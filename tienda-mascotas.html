<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda de Mascotas</title>

<style>

/* ===== MENU BOTON ===== */

.menu-toggle{
position:fixed;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
z-index:1001;
color:gold;
}

/* ===== SIDEBAR ===== */

.sidebar{
position:fixed;
top:0;
left:-320px;
width:300px;
height:100%;
background:#14110d;
border-right:3px solid gold;
padding-top:80px;
transition:0.35s;
z-index:1000;
}

.sidebar.active{
left:0;
}

.sidebar button{
display:block;
width:85%;
margin:15px auto;
padding:12px;
font-size:18px;
background:linear-gradient(45deg,gold,darkgoldenrod);
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
color:#2b1c0f;
}

/* SUBMENU */

.submenu{
display:none;
margin-left:20px;
}

.submenu button{
font-size:15px;
padding:8px;
}

/* ===== BODY ===== */

body{
margin:0;
font-family:Georgia,serif;
background:#1e1b16;
color:#f5e6c8;
text-align:center;
}

/* ===== TITULO ===== */

h1{
color:gold;
margin-top:40px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
max-width:900px;
margin:40px auto;
}

/* CUADRO */

.cuadro{
height:130px;
background:rgba(0,0,0,0.5);
border:3px solid #8b6f47;
border-radius:15px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.25s;
}

.cuadro:hover{
transform:scale(1.05);
}

/* TEXTO */

.nombre{
margin-top:5px;
font-size:14px;
}

/* BOTON */

button{
margin-top:8px;
padding:5px 12px;
border:none;
border-radius:8px;
background:gold;
cursor:pointer;
font-weight:bold;
}

/* ERROR */

.error{
background:#300;
border:3px solid red;
cursor:not-allowed;
}

/* YA TIENES */

.tienes{
background:#123012;
border:3px solid lime;
}

</style>
</head>

<body>

<!-- BOTON MENU -->

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<button onclick="ir('inicio2.html')">Inicio</button>

<button onclick="toggleTienda()">Tienda ▾</button>

<div class="submenu" id="submenuTienda">
<button onclick="ir('tienda-mascotas.html')">Mascotas</button>
<button onclick="ir('tienda-objetos.html')">Objetos</button>
<button onclick="ir('tienda-venta.html')">Venta</button>
<button onclick="ir('tienda-negra.html')">Tienda Negra</button>
</div>

<button onclick="toggleEquipar()">Equipar ▾</button>

<div class="submenu" id="submenuEquipar">
<button onclick="ir('equipar-mascota.html')">Mascota</button>
<button onclick="ir('equipar-titulo.html')">Título</button>
</div>

<button onclick="ir('titulos.html')">Títulos</button>

<button onclick="ir('clasificacion.html')">Clasificación</button>

<button onclick="ir('creditos.html')">Créditos</button>

</div>

<h1>🐾 Tienda de Mascotas</h1>

<h3>Monedas: <span id="monedas"></span></h3>

<div class="grid" id="grid"></div>

<script>

/* ===== MENU ===== */

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active");
}

function toggleEquipar(){
let menu=document.getElementById("submenuEquipar");
menu.style.display = menu.style.display==="block"?"none":"block";
}

function toggleTienda(){
let menu=document.getElementById("submenuTienda");
menu.style.display = menu.style.display==="block"?"none":"block";
}

function ir(pagina){

/* evita recargar si ya estas en la pagina */

if(window.location.pathname.includes(pagina)){
return;
}

window.location.href=pagina;

}

/* ===== MASCOTAS ===== */

let mascotas=[

"Slime",
"Lobo",
"Gato",
"Pájaro",
"Araña",

"Zorro",
"Slime Demon",
"Lobo Demon",
"Gato Demon",
"Pájaro Demon",

"Zorro Demon",
"Dragón Rojo",
"Dragón Blanco",
"Dragón Negro",
"Fénix",

"Fenrir",
"Mujer Demonio Zorra",
"Mujer Demonio Gato",
"Mujer Demonio Loba",
"Mujer Demonio"

];

/* ===== PRECIOS ===== */

let precios=[
50,80,80,60,90,
120,200,220,220,200,
250,500,500,600,700
];

/* ===== DATOS JUGADOR ===== */

let monedas=parseInt(localStorage.getItem("monedasJugador")) || 0;

let inventario=JSON.parse(localStorage.getItem("inventarioMascotas")) || [];

document.getElementById("monedas").textContent=monedas;

/* ===== GRID ===== */

let grid=document.getElementById("grid");

mascotas.forEach((nombre,i)=>{

let cuadro=document.createElement("div");

cuadro.classList.add("cuadro");

if(i>=15){

cuadro.classList.add("error");

cuadro.innerHTML=`
<div>❌</div>
<div class="nombre">${nombre}</div>
<div>ERROR</div>
`;

}

else if(inventario.includes(nombre)){

cuadro.classList.add("tienes");

cuadro.innerHTML=`
<div>🐾</div>
<div class="nombre">${nombre}</div>
<div>YA TIENES</div>
`;

}

else{

let precio=precios[i];

cuadro.innerHTML=`
<div>🐾</div>
<div class="nombre">${nombre}</div>
<button>Comprar (${precio})</button>
`;

cuadro.querySelector("button").onclick=()=>comprar(nombre,precio);

}

grid.appendChild(cuadro);

});

/* ===== COMPRAR ===== */

function comprar(nombre,precio){

if(monedas<precio){
alert("No tienes suficientes monedas");
return;
}

monedas-=precio;

inventario.push(nombre);

localStorage.setItem("monedasJugador",monedas);
localStorage.setItem("inventarioMascotas",JSON.stringify(inventario));

location.reload();

}

</script>

</body>
</html>
