<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipar Mascota</title>

    <link rel="stylesheet" href="menu.css">
    <script src="menu.js" defer></script>

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background: #1e1b16;
            color: #f5e6c8;
            text-align: center;
        }

        h1 { color: gold; margin-top: 80px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 40px auto;
        }

        .cuadro {
            height: 120px;
            background: rgba(0,0,0,0.5);
            border: 3px solid #8b6f47;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            transition: 0.25s;
        }

        .cuadro:hover { transform: scale(1.05); }
        .bloqueado { opacity: 0.4; cursor: not-allowed; }
        .equipado { border: 3px solid lime; box-shadow: 0 0 15px lime; }
        .nombre { margin-top: 5px; font-size: 12px; font-weight: bold; }
        .candado { font-size: 30px; }
        
        .mascota-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            image-rendering: pixelated; /* Útil si tus imágenes son pixel-art */
        }
    </style>
</head>
<body>

    <h1>🐾 Equipar Mascota</h1>
    <h3>Mascota equipada: <span id="mascotaEquipada">Ninguna</span></h3>

    <div class="grid" id="gridMascotas"></div>

    <script>
        // Lista de objetos: Nombre y archivo de imagen
        const mascotas = [
            { nombre: "Slime", img: "slime.png" },
            { nombre: "Lobo", img: "lobo.png" },
            { nombre: "Gato", img: "gato.png" },
            { nombre: "Pájaro", img: "pajaro.png" },
            { nombre: "Araña", img: "arana.png" },
            { nombre: "Zorro", img: "zorro.png" },
            { nombre: "Slime Demon", img: "slime-demon.png" },
            { nombre: "Lobo Demon", img: "lobo-demon.png" },
            { nombre: "Gato Demon", img: "gato-demon.png" },
            { nombre: "Pájaro Demon", img: "pajaro-demon.png" },
            { nombre: "Zorro Demon", img: "zorro-demon.png" },
            { nombre: "Dragón Rojo", img: "dragon-rojo.png" },
            { nombre: "Dragón Blanco", img: "dragon-blanco.png" },
            { nombre: "Dragón Negro", img: "dragon-negro.png" },
            { nombre: "Fénix", img: "fenix.png" },
            { nombre: "Fenrir", img: "fenrir.png" },
            { nombre: "Mujer Demonio Zorra", img: "zorra.png" },
            { nombre: "Mujer Demonio Gato", img: "gato.png" },
            { nombre: "Mujer Demonio Loba", img: "loba.png" },
            { nombre: "Mujer Demonio", img: "demonio.png" }
        ];

        let inventario = JSON.parse(localStorage.getItem("inventarioMascotas")) || [];
        let equipada = localStorage.getItem("mascotaEquipada");

        document.getElementById("mascotaEquipada").textContent = equipada || "Ninguna";

        const grid = document.getElementById("gridMascotas");

        mascotas.forEach(m => {
            let tiene = inventario.includes(m.nombre);
            let esEquipada = m.nombre === equipada;
            
            let cuadro = document.createElement("div");
            cuadro.className = `cuadro ${tiene ? '' : 'bloqueado'} ${esEquipada ? 'equipado' : ''}`;
            
            // Si tiene la mascota, muestra la imagen, si no, muestra el candado
            cuadro.innerHTML = `
                ${tiene ? `<img src="${m.img}" class="mascota-img" alt="${m.nombre}">` : '<div class="candado">🔒</div>'}
                <div class="nombre">${m.nombre}</div>
            `;
            
            if (tiene) cuadro.onclick = () => equipar(m.nombre);
            grid.appendChild(cuadro);
        });

        function equipar(nombre) {
            localStorage.setItem("mascotaEquipada", nombre);
            location.reload();
        }
    </script>
</body>
</html>
