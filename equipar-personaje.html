<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegir Personaje</title>

    <link rel="stylesheet" href="menu.css">
    <script src="menu.js" defer></script>

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background: #1e1b16;
            color: #f5e6c8;
            text-align: center;
        }

        h1 { color: gold; margin-top: 80px; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 500px;
            margin: 60px auto;
        }

        .cuadro {
            background: rgba(0,0,0,0.5);
            border: 3px solid #8b6f47;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: .25s;
        }

        .cuadro:hover { transform: scale(1.05); }

        .cuadro img {
            width: 150px;
            image-rendering: pixelated;
        }

        .elegido {
            border: 3px solid lime;
            box-shadow: 0 0 10px lime;
        }

        .nombre {
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Elegir Personaje</h1>

    <div class="grid">
        <div class="cuadro" id="hombre" onclick="elegir('hombre')">
            <img src="hombre.png" alt="Hombre">
            <div class="nombre">Hombre</div>
        </div>

        <div class="cuadro" id="mujer" onclick="elegir('mujer')">
            <img src="mujer.png" alt="Mujer">
            <div class="nombre">Mujer</div>
        </div>
    </div>

    <script>
        // Aplicar estado elegido al cargar
        const personaje = localStorage.getItem("personajeJugador");
        if (personaje) {
            document.getElementById(personaje)?.classList.add("elegido");
        }

        function elegir(tipo) {
            localStorage.setItem("personajeJugador", tipo);
            location.reload();
        }
    </script>
</body>
</html>
