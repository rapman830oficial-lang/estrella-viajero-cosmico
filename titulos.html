<html lang="es">
<head>

    <title>Guía de Títulos</title>

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background: #1e1b16;
            color: #f5e6c8;
            text-align: center;
        }

        h1 { color: gold; margin-top: 80px; }

        .lista {
            max-width: 800px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .titulo {
            background: rgba(0,0,0,0.6);
            border: 3px solid #8b6f47;
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            text-align: left;
            transition: .2s;
        }

        .titulo:hover { background: rgba(0,0,0,0.8); }
        .nombre { color: gold; font-size: 18px; }
        
        .descripcion {
            display: none;
            margin-top: 10px;
            font-size: 14px;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 8px;
        }

        .titulo.activo .descripcion { display: block; }
    </style>
</head>
<body>

    <h1>📜 Guía de Títulos</h1>
    <div class="lista" id="listaTitulos"></div>

    <script>
        const titulos = [
            ["Matador de Slime", "Matar 50 Slimes"],
            ["Cazador de Lobos", "Matar 50 Lobos"],
            ["Exterminador de Arañas", "Matar 50 Arañas"],
            ["Matador de Bestias", "Matar 100 monstruos de cualquier tipo"],

            ["Cazador de Dragón Rojo", "Matar 1 Dragón Rojo"],
            ["Cazador de Dragón Negro", "Matar 1 Dragón Negro"],
            ["Matador de Dragones", "Matar un Dragón de cada tipo"],
            ["Mazmorra Final", "Terminar la última mazmorra"],
            ["Matador Profesional", "Matar 500 monstruos"],
            ["Aventurero del Gremio", "Se obtiene al crear la licencia"],
            ["Comprador de Mascota", "Comprar 1 mascota"],
            ["Comprador de Pociones", "Comprar 1 poción"],
            ["Loco de las Mascotas", "Comprar todas las mascotas"],
            ["Loco de las Pociones", "Comprar 200 pociones"],
            ["Millonario", "Tener 1000 monedas"],
            ["Comprador de Tienda Oscura", "Comprar algo en la tienda negra"],
            ["Bebedor de Pociones", "Beber 200 pociones"],
            ["Invocador de Demonio", "Comprar un demonio en la tienda negra"],
            ["Domador de Fenrir", "Comprar a Fenrir"],
            ["Rango S", "Tener rango S"],

            ["ADD Demonio", "Título exclusivo para administradores"],
            ["Rey Demonio", "Título del creador Rapman830"]
        ];

        const lista = document.getElementById("listaTitulos");

        titulos.forEach(t => {
            let div = document.createElement("div");
            div.className = "titulo";
            div.innerHTML = `
                <div class="nombre">• ${t[0]}</div>
                <div class="descripcion"><b>Cómo conseguirlo:</b><br>${t[1]}</div>
            `;
            div.onclick = () => div.classList.toggle("activo");
            lista.appendChild(div);
        });
    </script>
</body>
