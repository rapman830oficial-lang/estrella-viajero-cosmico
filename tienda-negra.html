<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Negra</title>

    <link rel="stylesheet" href="menu.css">
    <script src="menu.js" defer></script>

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            color: #ffdddd;
            text-align: center;
            background-image: url("tienda-negra-fondo.png");
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.65);
            z-index: -1;
        }

        h1 { color: red; margin-top: 80px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 40px auto;
        }

        .item { display: flex; flex-direction: column; align-items: center; }

        .cuadro {
            width: 120px; height: 120px;
            background: rgba(0,0,0,0.8);
            border: 3px solid #660000;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .25s;
        }

        .cuadro:hover { transform: scale(1.05); border-color: red; }
        .bloqueado { opacity: .5; cursor: not-allowed; }
        .personaje-img { width: 70px; image-rendering: pixelated; }

        .nombre { margin-top: 8px; font-size: 14px; }
        .precio { font-size: 12px; color: #ff7777; }
    </style>
</head>
<body>

    <h1>🩸 Tienda Negra</h1>
    <h3>Solo los aventureros más oscuros compran aquí...</h3>

    <div class="grid" id="gridTienda"></div>

    <script>
        const mascotas = [
            {nombre:"Fenrir", precio:8000, imagen:"fenrir.png"},
            {nombre:"Mujer Demonio Zorra", precio:5000, imagen:"zorra.png"},
            {nombre:"Mujer Demonio Gato", precio:5000, imagen:"gato.png"},
            {nombre:"Mujer Demonio Loba", precio:5000, imagen:"loba.png"},
            {nombre:"Mujer Demonio", precio:10000, imagen:"demonio.png"}
        ];

        let inventario = JSON.parse(localStorage.getItem("inventarioMascotas")) || [];
        let monedas = parseInt(localStorage.getItem("monedasJugador")) || 0;
        let grid = document.getElementById("gridTienda");

        mascotas.forEach(m => {
            let item = document.createElement("div");
            item.classList.add("item");

            let tienes = inventario.includes(m.nombre);

            item.innerHTML = `
                <div class="cuadro ${tienes ? 'bloqueado' : ''}" onclick="${tienes ? '' : 'comprar('+JSON.stringify(m).replace(/"/g, "'")+')'}">
                    <img src="${m.imagen}" class="personaje-img">
                </div>
                <div class="nombre">${m.nombre}</div>
                <div class="precio">${tienes ? 'Ya comprado' : m.precio + ' monedas'}</div>
            `;
            grid.appendChild(item);
        });

        function comprar(m) {
            if (monedas < m.precio) return alert("No tienes suficientes monedas.");
            
            monedas -= m.precio;
            localStorage.setItem("monedasJugador", monedas);
            inventario.push(m.nombre);
            localStorage.setItem("inventarioMascotas", JSON.stringify(inventario));
            
            alert("Has comprado: " + m.nombre);
            location.reload();
        }
    </script>
</body>
</html>
