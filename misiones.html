</html><!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misiones del Gremio</title>

    <link rel="stylesheet" href="menu.css">
    <script src="menu.js" defer></script>

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background: #1e1b16;
            color: #3b2b15;
            text-align: center;
        }

        h1 { color: gold; margin-top: 80px; }

        .mural {
            max-width: 1100px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
        }

        .mision {
            background: url("pergamino.png");
            background-size: 100% 100%;
            background-repeat: no-repeat;
            height: 170px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        .titulo { font-size: 16px; }
        .recompensa { font-size: 13px; color: #7a5200; }

        button {
            margin-top: 8px;
            padding: 6px 12px;
            background: gold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h1>📜 Mural de Misiones del Gremio</h1>

    <div class="mural" id="muralMisiones"></div>

    <script>
        const misiones = [
            ["Matar 5 Slimes", 20], ["Matar 10 Slimes", 40], ["Matar 20 Slimes", 80],
            ["Cazar 3 Lobos", 30], ["Cazar 6 Lobos", 60], ["Cazar 10 Lobos", 100],
            ["Eliminar 5 Arañas", 40], ["Eliminar 10 Arañas", 80],
            ["Derrotar Goblins", 60], ["Derrotar 10 Goblins", 120],
            ["Explorar Bosque", 40], ["Explorar Mazmorra", 100], ["Explorar Mazmorra Oscura", 150],
            ["Buscar Tesoro", 120], ["Abrir Cofre Antiguo", 80],
            ["Comprar Mascota", 100], ["Comprar 3 Mascotas", 200], ["Comprar 5 Mascotas", 400],
            ["Ganar 200 monedas", 80], ["Ganar 500 monedas", 150], ["Ganar 1000 monedas", 300],
            ["Derrotar Dragón Menor", 400], ["Derrotar Dragón Rojo", 600], ["Derrotar Dragón Negro", 800],
            ["Completar Examen", 100], ["Subir a rango C", 200], ["Subir a rango B", 300],
            ["Subir a rango A", 500], ["Subir a rango S", 800],
            ["Convertirse en Aventurero Legendario", 1000]
        ];

        const mural = document.getElementById("muralMisiones");

        misiones.forEach(m => {
            let div = document.createElement("div");
            div.className = "mision";
            div.innerHTML = `
                <div class="titulo">${m[0]}</div>
                <div class="recompensa">${m[1]} monedas</div>
                <button onclick="completar(${m[1]})">Completar</button>
            `;
            mural.appendChild(div);
        });

        function completar(recompensa) {
            let monedas = parseInt(localStorage.getItem("monedasJugador")) || 0;
            monedas += recompensa;
            localStorage.setItem("monedasJugador", monedas);
            alert("Misión completada! +" + recompensa + " monedas");
            location.reload();
        }
    </script>
</body>
</html>
