<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipar Título</title>

    <link rel="stylesheet" href="menu.css">
    <script src="menu.js" defer></script>

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background: #1e1b16;
            color: #f5e6c8;
            text-align: center;
        }

        h1 { color: gold; margin-top: 80px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 900px;
            margin: 40px auto;
        }

        .cuadro {
            height: 120px;
            background: rgba(0,0,0,0.5);
            border: 3px solid #8b6f47;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .25s;
        }

        .cuadro:hover { transform: scale(1.05); }
        .bloqueado { opacity: .4; cursor: not-allowed; }
        .equipado { border: 3px solid lime; box-shadow: 0 0 10px lime; }
        .nombre { margin-top: 5px; font-size: 13px; }
        .candado { font-size: 30px; }
    </style>
</head>
<body>

    <h1>👑 Equipar Título</h1>
    <h3>Título equipado: <span id="tituloActual">Ninguno</span></h3>

    <div class="grid" id="gridTitulos"></div>

    <script>
        const titulos = [
            "Matador de Slime", "Cazador de Lobos", "Exterminador de Arañas", "Matador de Bestias",
            "Cazador de Demonios", "Cazador de Slime Demonio", "Cazador de Lobo Demonio", "Cazador de Araña Demonio",
            "Cazador de Dragón Rojo", "Cazador de Dragón Negro", "Matador de Dragones",
            "Mazmorra Final", "Matador Profesional", "Aventurero",
            "Comprador de Mascotas", "Loco de las Mascotas", "Millonario", "Comprador de Tienda Oscura",
            "Invocador de Demonio", "Domador de Fenrir", "Rango S",
            "Miembro Demoníaco", "ADD Demonio", "Rey Demonio"
        ];

        let inventarioTitulos = JSON.parse(localStorage.getItem("inventarioTitulos")) || [];
        let mascotas = JSON.parse(localStorage.getItem("inventarioMascotas")) || [];
        let monedas = parseInt(localStorage.getItem("monedasJugador")) || 0;
        let puntos = parseInt(localStorage.getItem("puntosJugador")) || 0;
        let equipado = localStorage.getItem("tituloJugador");

        // Lógica de desbloqueo automático
        function desbloquear(titulo) {
            if (!inventarioTitulos.includes(titulo)) inventarioTitulos.push(titulo);
        }

        if (localStorage.getItem("licenciaCreada") === "si") desbloquear("Aventurero");
        if (mascotas.length >= 1) desbloquear("Comprador de Mascotas");
        if (mascotas.length >= 20) desbloquear("Loco de las Mascotas");
        if (mascotas.includes("Fenrir")) desbloquear("Domador de Fenrir");
        if (["Mujer Demonio", "Mujer Demonio Gato", "Mujer Demonio Loba", "Mujer Demonio Zorra"].some(m => mascotas.includes(m))) desbloquear("Invocador de Demonio");
        if (monedas >= 1000) desbloquear("Millonario");
        if (puntos >= 85) desbloquear("Rango S");

        localStorage.setItem("inventarioTitulos", JSON.stringify(inventarioTitulos));
        document.getElementById("tituloActual").textContent = equipado || "Ninguno";

        const grid = document.getElementById("gridTitulos");

        titulos.forEach(nombre => {
            let tiene = inventarioTitulos.includes(nombre);
            let esEquipado = nombre === equipado;
            
            let cuadro = document.createElement("div");
            cuadro.className = `cuadro ${tiene ? '' : 'bloqueado'} ${esEquipado ? 'equipado' : ''}`;
            
            cuadro.innerHTML = `
                <div class="${tiene ? '' : 'candado'}">${tiene ? '👑' : '🔒'}</div>
                <div class="nombre">${nombre}</div>
            `;
            
            if (tiene) cuadro.onclick = () => equipar(nombre);
            grid.appendChild(cuadro);
        });

        function equipar(nombre) {
            localStorage.setItem("tituloJugador", nombre);
            location.reload();
        }
    </script>
</body>
</html>
